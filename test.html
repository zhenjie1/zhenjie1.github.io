<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=0,minimal-ui,viewport-fit=cover">
    <script type="text/javascript" src="js/jquery-2.0.3.min.js"></script>
    <script type="text/javascript" src="js/three.js"></script>
    <script type="text/javascript" src="js/OrbitControls.js"></script>
    <script type="text/javascript" src="js/DDSLoader.js"></script>
    <script type="text/javascript" src="js/OBJLoader.js"></script>
    <script type="text/javascript" src="js/OBJMTLLoader.js"></script>
    <title></title>
</head>
<style>
    body {
        margin: 0;
        overflow: hidden;
    }

    #percent {
        position: absolute;
        top: 20px;
        width: 200px;
        height: 20px;
        color: white;
        text-align: center;
        border: 1px;
    }

    #WebGL-output {
        position: absolute;
        left: 0;
        top: 0;
    }
</style>
<body>
<div id="percent"></div>
<div id="WebGL-output"></div>

<script>

    $(function () {
        //直接开启帧数检测
        //编辑代码处
        var scene = new THREE.Scene();//场景构建
        var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);//相机构建
        var renderer = new THREE.WebGLRenderer({alpha: true});//渲染器构建
        // renderer.setClearColor(0xEEEEEE, 0.0);
        renderer.setClearColor(0x000000, .0);
        // renderer.setClearAlpha(0.0);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMapEnabled = true;//激活阴影
        //构建一个坐标轴
        // var axes = new THREE.AxisHelper(100);
        // scene.add(axes);

        //创建控件并绑定在相机上
        var controls = null;
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.25;
        controls.enableZoom = false;
        // controls.minAzimuthAngle = 60
        // controls.maxAzimuthAngle = 60
        // controls.minPolarAngle = -300
        // controls.maxPolarAngle = -300


        var planeGeometry = new THREE.PlaneGeometry(40, 20);
        //var planeMaterial = new THREE.MeshBasicMaterial({color:0xcccccc});
        var planeMaterial = new THREE.MeshLambertMaterial({color: 0xffffff});//转换对光源有渲染的材质
        var plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -0.5 * Math.PI;
        plane.position.x = 15;
        plane.position.y = 0;
        plane.position.x = 0;
        // scene.add(plane);
        plane.receiveShadow = true;
        //添加材质灯光阴影
        var ambientLight = new THREE.AmbientLight('#fff');
        scene.add(ambientLight);

        // model
        var onProgress = function (xhr) {
            if (xhr.lengthComputable) {
                var percentComplete = xhr.loaded / xhr.total * 100;
                var percent = document.getElementById("percent");
                percent.innerText = Math.round(percentComplete, 2) + '% 已经加载';
            }
        };
        var onError = function (xhr) {
        };

        var objectMTL = null;

        var mtlLoader = new THREE.MTLLoader();
        mtlLoader.setPath('assets/');
        mtlLoader.load('model.mtl', function (materials) {
            materials.preload();

            var objLoader = new THREE.OBJLoader();
            objLoader.setMaterials(materials);
            objLoader.setPath('assets/');
            objLoader.load('model.obj', function (object) {

                objectMTL = object;
                object.rotation.x = -1.6;
                object.rotation.z = 0.4;


                object.position.y = -2;
                object.scale.set(0.013, 0.013, 0.013);
                scene.add(object);

            }, onProgress, onError);
        });

        //渲染视图视角
        camera.position.x = 0;
        camera.position.y = 15;
        camera.position.z = 32;
        camera.lookAt(scene.position);
        $("#WebGL-output").append(renderer.domElement);

        renderScene();

        function renderScene() {
            if (objectMTL) {
                objectMTL.rotation.z += .01
            }
            var clock = new THREE.Clock();
            controls.update();
            var delta = clock.getDelta();
            requestAnimationFrame(renderScene);
            renderer.render(scene, camera);
        }

    })
</script>

</body>
</html>
